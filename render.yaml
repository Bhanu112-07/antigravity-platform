services:
  - type: web
    name: antigravity-api
    env: node
    buildCommand: npm run install:all && npm run build:backend
    startCommand: npm run start:backend
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: PORT
        value: 10000

  - type: web
    name: antigravity-frontend
    env: node
    buildCommand: npm run install:all && npm run build:frontend
    startCommand: npm run start:frontend
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
